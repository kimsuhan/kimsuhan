name: Sync README Activity

on:
  workflow_dispatch:
  schedule:
    - cron: "17 1 * * *"

permissions:
  contents: write

jobs:
  update-activity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update latest activity section
        env:
          USERNAME: kimsuhan
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          events="$(curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/users/${USERNAME}/events/public?per_page=100")"

          pushes="$(echo "${events}" | jq '[.[] | select(.type == "PushEvent")] | length')"
          pull_requests="$(echo "${events}" | jq '[.[] | select(.type == "PullRequestEvent")] | length')"
          issues="$(echo "${events}" | jq '[.[] | select(.type == "IssuesEvent")] | length')"
          now_utc="$(date -u +"%Y-%m-%d %H:%M UTC")"

          mapfile -t repos < <(echo "${events}" | jq -r '.[].repo.name' | awk '!seen[$0]++' | head -n 5)

          {
            echo "<!--LATEST_ACTIVITY:START-->"
            echo "- Last updated: ${now_utc}"
            echo "- Recent public events (last 100): Push ${pushes}, PR ${pull_requests}, Issues ${issues}"
            echo "- Recently active repositories:"
            if [ "${#repos[@]}" -eq 0 ]; then
              echo "  - No recent public repository activity found."
            else
              for repo in "${repos[@]}"; do
                echo "  - [${repo}](https://github.com/${repo})"
              done
            fi
            echo "<!--LATEST_ACTIVITY:END-->"
          } > activity_block.md

          perl -0777 -i -pe 's/<!--LATEST_ACTIVITY:START-->.*?<!--LATEST_ACTIVITY:END-->/do { local $\/; open my $fh, "<", "activity_block.md"; <$fh> }/gse' README.md

      - name: Commit changes when needed
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet README.md; then
            echo "No README changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore(readme): update latest activity snapshot"
          git push
